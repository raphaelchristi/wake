# Wake Helm chart values.
#
# Every option below has a sensible default; only image tags + secrets
# typically need overriding for a real deployment.

# ---------------------------------------------------------------------------
# Image references — set to your registry / tag.
# ---------------------------------------------------------------------------

image:
  repository: wake-ai/wake
  tag: "0.4.0"
  pullPolicy: IfNotPresent

imagePullSecrets: []
# Per-component overrides land under api / worker below if you split images.

# ---------------------------------------------------------------------------
# Authentication — shared API key for dashboard ↔ backend.
# Phase 5.1: fail-closed by default. The chart REQUIRES either
# ``auth.apiKey`` (plaintext, rendered into the chart-managed Secret) or
# ``auth.apiKeySecretRef`` (BYO existing Secret) when ``auth.required``
# is true. Leaving both empty causes the API to 503 every request — by
# design — surfacing the misconfiguration as a deployment failure
# rather than a silent fail-open.
# ---------------------------------------------------------------------------

auth:
  # Fail-closed: when true, the API rejects every authenticated route
  # with 503 unless an API key is also wired. Production deployments
  # should keep this true. Set to false ONLY for fully untrusted-but-
  # internal dev clusters where you understand the risk.
  required: true
  # Plaintext API key. Pick at least 32 random bytes:
  #   openssl rand -hex 32
  # If you do not want a plaintext value in values.yaml, leave this
  # empty and set ``apiKeySecretRef`` to point at an existing Secret.
  apiKey: ""
  # Existing Secret reference (preferred for production).
  apiKeySecretRef:
    name: ""
    key: ""

  # HMAC secret used to sign OAuth ``state`` tokens (Phase 5.1 vault
  # changes). MUST be identical across every API replica or callbacks
  # initiated on pod A will fail verification on pod B with
  # ``invalid or expired OAuth state``. The chart therefore REQUIRES
  # either ``oauthStateSecret`` (plaintext, rendered into the
  # chart-managed Secret) or ``oauthStateSecretRef`` (BYO existing
  # Secret) whenever ``api.replicas`` > 1. Generate with
  # ``openssl rand -hex 32``.
  oauthStateSecret: ""
  oauthStateSecretRef:
    name: ""
    key: ""

# ---------------------------------------------------------------------------
# API tier — handles HTTP + SSE.
# ---------------------------------------------------------------------------

api:
  enabled: true
  replicas: 2
  image: {}   # override repository / tag here if different from global
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1
      memory: 1Gi
  service:
    type: ClusterIP
    port: 8080
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ---------------------------------------------------------------------------
# Frontend tier — Wake Dashboard (Next.js 15 standalone).
# Phase 5. Set ``frontend.enabled: false`` if you only want the API.
# ---------------------------------------------------------------------------

frontend:
  enabled: true
  replicas: 2
  image:
    repository: wake-ai/dashboard
    tag: "0.5.0"
    pullPolicy: IfNotPresent
  # URL the BROWSER calls to reach the wake-api. In most deployments
  # this is the public ingress host (HTTPS terminated by the ingress
  # controller); the in-cluster service URL is used only by server-side
  # Next.js route handlers. Injected into the Next.js process as
  # ``NEXT_PUBLIC_WAKE_API_BASE`` and baked into the client bundle.
  publicApiUrl: "https://wake.example.com"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  service:
    type: ClusterIP
    port: 3000
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ---------------------------------------------------------------------------
# Worker tier — runs harness sessions; multiple replicas pick from
# Postgres via advisory locks.
# ---------------------------------------------------------------------------

worker:
  enabled: true
  replicas: 3
  image: {}
  concurrency: 4
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2
      memory: 2Gi
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ---------------------------------------------------------------------------
# Postgres — event store + advisory locks.
# Production deployments should use a managed Postgres (RDS, Cloud SQL,
# Crunchy / Zalando operator). The bundled StatefulSet is dev-grade.
# ---------------------------------------------------------------------------

postgres:
  enabled: true       # set false to BYO managed Postgres
  image:
    repository: postgres
    tag: "16"
  user: wake
  database: wake
  # In production, prefer ``existingSecret`` to a plaintext value.
  password: "wake-dev-password"
  existingSecret: ""
  persistence:
    enabled: true
    size: 50Gi
    storageClass: ""
  resources:
    requests:
      cpu: 1
      memory: 1Gi
  partitions: 16     # event table HASH partitions

# ---------------------------------------------------------------------------
# Redis — pub/sub fan-out, lightweight queue.
# ---------------------------------------------------------------------------

redis:
  enabled: true
  image:
    repository: redis
    tag: "7-alpine"

# ---------------------------------------------------------------------------
# agentgateway — egress proxy / MCP routing sidecar.
# ---------------------------------------------------------------------------

agentgateway:
  enabled: true
  image:
    repository: ghcr.io/agentgateway/agentgateway
    tag: latest
  port: 8888
  allowedHosts:
    - api.anthropic.com
    - api.openai.com
    - api.github.com
    - slack.com
    - api.notion.com
  mcpRoutes:
    - name: github
      upstream: https://api.github.com
      vaultRef: github_token

# ---------------------------------------------------------------------------
# Infisical vault — credential storage.
# ---------------------------------------------------------------------------

vault:
  enabled: true
  image:
    repository: infisical/infisical
    tag: latest
  # The chart consumes only the *URL* via the API/worker env; tokens
  # live in a Secret rendered separately.
  url: ""          # leave empty to use the in-cluster service
  encryptionKey: ""  # required, generate with `openssl rand -hex 16`
  authSecret: ""     # required, generate with `openssl rand -base64 32`

# ---------------------------------------------------------------------------
# Ingress — terminate TLS in front of the API service.
# ---------------------------------------------------------------------------

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: wake.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

# ---------------------------------------------------------------------------
# Secrets — model API keys & sensitive env. Reference an existing
# Secret object to avoid storing plaintext in values.yaml.
# ---------------------------------------------------------------------------

secrets:
  anthropicApiKey: ""
  openaiApiKey: ""
  existingSecret: ""   # if set, ignores the two fields above

# ---------------------------------------------------------------------------
# Observability — OTLP exporter, optional.
# ---------------------------------------------------------------------------

observability:
  otel:
    enabled: false
    endpoint: ""
    serviceNamePrefix: "wake"

# ---------------------------------------------------------------------------
# Monitoring — Prometheus ServiceMonitor (Phase 7 / Tier 1 gap #8).
#
# Opt-in. Renders a ServiceMonitor CR that kube-prometheus-stack
# (or any Operator-managed Prometheus) discovers and scrapes /metrics
# on the wake-api Service. The /metrics endpoint is unauthenticated
# by Prometheus convention — restrict at the network layer with a
# NetworkPolicy that allows only the monitoring namespace.
#
# REQUIREMENT: the cluster must have the monitoring.coreos.com/v1
# ServiceMonitor CRD installed (provided by kube-prometheus-stack /
# Prometheus Operator). If the CRD is missing, ``helm install`` will
# fail with "no matches for kind ServiceMonitor".
#
# The ``labels`` map should include whichever discovery selector your
# Prometheus instance uses. For kube-prometheus-stack defaults that's
# ``release: prometheus``. Adjust per environment.
#
# Cardinality: enable ``WAKE_METRICS_WORKSPACE_LABEL=true`` in the API
# pod env ONLY if you have ≤ ~100 workspaces in a tenant. With more
# workspaces, leave it off and aggregate at the dashboard layer.
# ---------------------------------------------------------------------------

monitoring:
  enabled: false
  # Extra labels to merge onto the ServiceMonitor metadata. kube-prom-stack
  # default selector is `release: prometheus` — set accordingly.
  labels: {}
  annotations: {}
  # Scrape settings — defaults match kube-prometheus-stack global rules.
  interval: "30s"
  scrapeTimeout: "10s"
  scheme: "http"
  honorLabels: false
  path: "/metrics"
  # Forward these target labels onto the scraped series.
  targetLabels: []
  # Optional tlsConfig {ca,cert,key,insecureSkipVerify} for HTTPS scrapes.
  tlsConfig: {}
  # Relabel rules applied at the target level.
  relabelings: []
  # Relabel rules applied to ingested samples (filter out high-cardinality
  # series here if needed).
  metricRelabelings: []

# ---------------------------------------------------------------------------
# Backup — pgbackrest-based Postgres backup to S3-compatible object store.
#
# Phase 6 / Tier 0 gap #3. Pgbackrest is a sidecar/cron-driven workflow:
#   * Weekly full backup (default Sun 02:00 UTC) — `pgbackrest --type=full`
#   * Daily incremental (default Mon-Sat 02:00 UTC) — `pgbackrest --type=incr`
#
# Retention is by COUNT, not by time:
#   * retention.full = 4   → keep 4 weekly full backups (≈ 28d)
#   * retention.incremental = 30  → keep 30 incremental backups
#
# Storage: any S3-compatible endpoint works (AWS S3, MinIO, Cloudflare R2,
# Backblaze B2, etc). Set ``s3.secretName`` to reference a pre-existing
# Secret containing ``accessKeyId`` + ``secretAccessKey`` keys (recommended
# for prod), OR set ``s3.accessKeyId`` + ``s3.secretAccessKey`` inline (the
# chart will render a managed Secret — fine for dev / sealed-secrets flows).
#
# RTO target: < 30 minutes (validated weekly in CI via scripts/restore-drill.sh)
# RPO target: < 24 hours (incremental cadence)
#
# Default: backup.enabled = false (opt-in). Production deployments MUST
# flip this to true. See docs/DISASTER-RECOVERY.md for the runbook.
# ---------------------------------------------------------------------------

backup:
  enabled: false

  # Image of the pgbackrest CronJob container. Pin a digest in prod.
  image:
    repository: pgbackrest/pgbackrest
    tag: "2.54.0"
    pullPolicy: IfNotPresent

  # Cron schedules (UTC). Override per environment. The default places the
  # full backup on Sunday 02:00 and incrementals on Mon-Sat 02:00 so daily
  # backups are guaranteed regardless of day-of-week.
  schedule:
    full: "0 2 * * 0"
    incremental: "0 2 * * 1-6"

  # Retention policy. Pgbackrest expires old backups automatically when
  # these counts are exceeded.
  retention:
    # Number of weekly full backups to keep (≈ 4 weeks).
    full: 4
    # Number of incremental backups to keep (≈ 30 days at one/day).
    incremental: 30

  # pgbackrest stanza name. Stanza = logical grouping of one cluster's
  # backups in the repository. Default uses release fullname so multiple
  # Wake instances sharing a bucket don't collide.
  stanza: ""

  # Process count for parallel compression / upload. Bumping to 4-8 is
  # safe on hosts with enough CPU and noticeably speeds large backups.
  processMax: 2

  # WAL retention — number of WAL archive snapshots to retain alongside
  # backups. Required for any point-in-time restore between full backups.
  archiveCheck: true

  # S3-compatible storage. Set ``secretName`` to BYO Secret OR fill
  # accessKeyId/secretAccessKey inline. Production: prefer ``secretName``.
  s3:
    # Endpoint URL. Examples:
    #   AWS S3:        https://s3.amazonaws.com (leave empty for AWS)
    #   MinIO:         http://minio.minio.svc.cluster.local:9000
    #   Cloudflare R2: https://<account>.r2.cloudflarestorage.com
    endpoint: ""
    bucket: ""
    region: "us-east-1"
    # Path-style addressing vs virtual-hosted. MinIO / R2 require path.
    uriStyle: "path"
    # Verify TLS certificates. Set false ONLY for MinIO-with-self-signed.
    verifyTls: true
    # BYO Secret. Must contain keys ``access-key-id`` + ``secret-access-key``.
    # When set, the chart will NOT render its own backup-s3 Secret and the
    # CronJob will mount these creds from the referenced Secret.
    secretName: ""
    # Inline creds (only used when secretName is empty). Stored b64-encoded
    # in the chart-managed Secret. Avoid committing real creds to values.
    accessKeyId: ""
    secretAccessKey: ""

  # Restore-test Job — runs pgbackrest restore into an EMPTY PVC then
  # verifies it can start. Useful as a Helm hook (post-install,
  # post-upgrade) for early detection of bad backups, but most operators
  # leave this off and rely on the weekly CI drill (scripts/restore-drill.sh)
  # because the hook adds 5-10min to every upgrade.
  restoreTest:
    enabled: false
    # Hooks: "test" runs only on `helm test`; "post-install,post-upgrade"
    # runs after every install/upgrade. Use "test" by default.
    hookType: "test"
    # Storage for the throwaway restore target.
    storage:
      size: 10Gi
      storageClass: ""

  # CronJob resources. Backups are I/O heavy not CPU heavy; defaults are
  # tuned for a Wake-sized cluster (< 100GB DB).
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1
      memory: 1Gi

  # Optional: pod node placement controls.
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ---------------------------------------------------------------------------
# Pod security defaults.
# ---------------------------------------------------------------------------

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  fsGroup: 10001

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop: ["ALL"]

# Service account name reuse / creation.
serviceAccount:
  create: true
  name: ""
  annotations: {}

# ---------------------------------------------------------------------------
# Naming / labels.
# ---------------------------------------------------------------------------

nameOverride: ""
fullnameOverride: ""
commonLabels: {}
commonAnnotations: {}
