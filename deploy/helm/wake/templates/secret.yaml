{{- if not .Values.secrets.existingSecret }}
{{- /*
  Fail-fast: when no BYO Secret is provided AND auth.required is true,
  the operator MUST set auth.apiKey OR auth.apiKeySecretRef. Otherwise
  the API ships fail-closed-with-no-key (every request 503) which is a
  deployment regression, not a useful default.
*/}}
{{- if and .Values.auth.required (not .Values.auth.apiKeySecretRef.name) (not .Values.auth.apiKey) -}}
{{- fail "auth.required=true but neither auth.apiKey nor auth.apiKeySecretRef.name is set. Generate a key with `openssl rand -hex 32` and pass it via --set auth.apiKey=... or reference an existing Secret via auth.apiKeySecretRef.name/key." -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "wake.fullname" . }}-secret
  labels:
    {{- include "wake.labels" . | nindent 4 }}
type: Opaque
data:
  postgres-password: {{ .Values.postgres.password | b64enc | quote }}
  anthropic-api-key: {{ .Values.secrets.anthropicApiKey | b64enc | quote }}
  openai-api-key: {{ .Values.secrets.openaiApiKey | b64enc | quote }}
  vault-encryption-key: {{ default "6c1fe4e407b8911c104518103505b218" .Values.vault.encryptionKey | b64enc | quote }}
  vault-auth-secret: {{ default "5lrMXKKWCVocSrYjEYmDMOh8PCypIIVeo80fBoTomtw=" .Values.vault.authSecret | b64enc | quote }}
  {{- /*
    Only render wake-api-key when no BYO Secret is referenced. When
    auth.apiKeySecretRef.name is set, the API + frontend deployments
    pull WAKE_API_KEY from that Secret instead and this chart-managed
    entry would shadow it.
  */}}
  {{- if not .Values.auth.apiKeySecretRef.name }}
  wake-api-key: {{ .Values.auth.apiKey | b64enc | quote }}
  {{- end }}
{{- end }}
