{{- if .Values.api.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "wake.fullname" . }}-api
  labels:
    {{- include "wake.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.api.service.type }}
  ports:
    - port: {{ .Values.api.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "wake.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
{{- end }}
---
{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "wake.fullname" . }}-postgres
  labels:
    {{- include "wake.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  type: ClusterIP
  clusterIP: None  # Headless service for StatefulSet
  ports:
    - port: 5432
      targetPort: pg
  selector:
    {{- include "wake.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
{{- end }}
---
{{- if .Values.redis.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "wake.fullname" . }}-redis
  labels:
    {{- include "wake.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  ports:
    - port: 6379
      targetPort: 6379
      name: redis
  selector:
    {{- include "wake.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: redis
{{- end }}
---
{{- if .Values.agentgateway.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "wake.fullname" . }}-agentgateway
  labels:
    {{- include "wake.labels" . | nindent 4 }}
    app.kubernetes.io/component: agentgateway
spec:
  ports:
    - port: {{ .Values.agentgateway.port }}
      targetPort: proxy
      name: proxy
  selector:
    {{- include "wake.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: agentgateway
{{- end }}
---
{{- if .Values.vault.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "wake.fullname" . }}-vault
  labels:
    {{- include "wake.labels" . | nindent 4 }}
    app.kubernetes.io/component: vault
spec:
  ports:
    - port: 8080
      targetPort: api
      name: api
  selector:
    {{- include "wake.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: vault
{{- end }}
{{- if .Values.redis.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "wake.fullname" . }}-redis
  labels:
    {{- include "wake.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "wake.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        {{- include "wake.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: redis
    spec:
      containers:
        - name: redis
          image: "{{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}"
          ports:
            - containerPort: 6379
{{- end }}
