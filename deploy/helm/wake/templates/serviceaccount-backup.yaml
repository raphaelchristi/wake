{{- if .Values.backup.enabled }}
{{- /*
  Dedicated ServiceAccount for the backup CronJob.

  Least-privilege: backup pods don't need any Kubernetes API access. The
  SA exists only so audit logs / network policies can target backup pods
  distinctly from API/worker pods. No RoleBinding is created.
*/}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "wake.fullname" . }}-backup
  labels:
    {{- include "wake.labels" . | nindent 4 }}
    app.kubernetes.io/component: backup
  annotations:
    # Operators can hang IRSA / Workload Identity annotations here to
    # let backup pods assume an AWS / GCP role instead of using static
    # S3 access keys. Set via --set backup.serviceAccount.annotations.
    {{- with .Values.serviceAccount.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
