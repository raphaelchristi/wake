{{- if .Values.backup.enabled }}
{{- /*
  S3 credentials Secret — rendered ONLY when no BYO Secret is referenced.

  When `backup.s3.secretName` is set, the CronJob pulls creds from that
  external Secret (best practice for prod: created via sealed-secrets,
  external-secrets-operator, or kubectl create secret).

  When `backup.s3.secretName` is empty, the chart renders this managed
  Secret from `backup.s3.accessKeyId` / `backup.s3.secretAccessKey`. Fine
  for dev/CI; not recommended for prod (creds live in values.yaml).

  Fail-fast: when backup.enabled=true AND no BYO Secret AND inline creds
  are empty, render an error rather than shipping a broken CronJob.
*/}}
{{- if not .Values.backup.s3.secretName -}}
{{- if not .Values.backup.s3.bucket -}}
{{- fail "backup.enabled=true requires backup.s3.bucket to be set (no bucket = no place to write backups)." -}}
{{- end -}}
{{- if or (not .Values.backup.s3.accessKeyId) (not .Values.backup.s3.secretAccessKey) -}}
{{- fail "backup.enabled=true and backup.s3.secretName is empty, but backup.s3.accessKeyId or backup.s3.secretAccessKey is also empty. Either set both inline OR set backup.s3.secretName to reference an existing Secret with keys access-key-id + secret-access-key." -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "wake.fullname" . }}-backup-s3
  labels:
    {{- include "wake.labels" . | nindent 4 }}
    app.kubernetes.io/component: backup
type: Opaque
data:
  access-key-id: {{ .Values.backup.s3.accessKeyId | b64enc | quote }}
  secret-access-key: {{ .Values.backup.s3.secretAccessKey | b64enc | quote }}
{{- end }}
{{- end }}
