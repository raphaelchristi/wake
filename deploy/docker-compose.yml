# Wake — production-grade docker-compose stack.
#
# Brings up the full Phase 4 topology on a single host:
#
#   * wake-api          — FastAPI (uvicorn) on :8080
#   * wake-worker       — harness worker (multi-instance via `--scale`)
#   * postgres          — Postgres 16, event store + advisory locks
#   * redis             — pub/sub fan-out + lightweight queue
#   * agentgateway      — egress proxy / MCP routing sidecar
#   * infisical-vault   — credential vault sidecar (Phase 4 vault)
#
# Run:
#   docker compose -f deploy/docker-compose.yml up -d
#   curl http://localhost:8080/health
#
# Scale workers:
#   docker compose -f deploy/docker-compose.yml up -d --scale wake-worker=3
#
# Override for dev (hot reload): include docker-compose.dev.yml as the
# second `-f` argument.

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: wake
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wake-dev-password}
      POSTGRES_DB: wake
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wake -d wake"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  agentgateway:
    # Real production deployments pin a specific agentgateway release.
    # We use ghcr.io's nightly here to avoid bundling a Rust toolchain
    # into this compose file; swap for a stable tag in your fork.
    image: ghcr.io/agentgateway/agentgateway:latest
    restart: unless-stopped
    command: ["--config", "/etc/agentgateway/config.yaml"]
    ports:
      - "8888:8888"
    volumes:
      - ./agentgateway/config.yaml:/etc/agentgateway/config.yaml:ro
    depends_on:
      - infisical-vault

  infisical-vault:
    image: infisical/infisical:latest
    restart: unless-stopped
    environment:
      ENCRYPTION_KEY: ${INFISICAL_ENCRYPTION_KEY:-6c1fe4e407b8911c104518103505b218}
      AUTH_SECRET: ${INFISICAL_AUTH_SECRET:-5lrMXKKWCVocSrYjEYmDMOh8PCypIIVeo80fBoTomtw=}
      DB_CONNECTION_URI: postgres://wake:${POSTGRES_PASSWORD:-wake-dev-password}@postgres:5432/wake
      REDIS_URL: redis://redis:6379
    ports:
      - "8200:8080"  # Infisical's web UI / API
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  wake-api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: wake-ai/wake:0.4.0
    restart: unless-stopped
    environment:
      WAKE_DATABASE_URL: postgresql+asyncpg://wake:${POSTGRES_PASSWORD:-wake-dev-password}@postgres:5432/wake
      WAKE_REDIS_URL: redis://redis:6379
      WAKE_VAULT_URL: http://infisical-vault:8080
      WAKE_AGENTGATEWAY_URL: http://agentgateway:8888
      WAKE_LOG_LEVEL: ${WAKE_LOG_LEVEL:-info}
      # Fail-closed auth (Phase 5.1 finding #3). Required=true means
      # the API refuses every authenticated route with 503 unless the
      # operator also exports WAKE_API_KEY. ${VAR:?msg} makes compose
      # exit early if the operator forgot to set the key.
      WAKE_AUTH_REQUIRED: "true"
      WAKE_API_KEY: ${WAKE_API_KEY:?WAKE_API_KEY is required — export it before docker compose up}
      # Per-provider keys are mounted from the host env so they never
      # land in image layers.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  wake-worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: wake-ai/wake:0.4.0
    restart: unless-stopped
    command: ["worker", "--concurrency", "4"]
    environment:
      WAKE_DATABASE_URL: postgresql+asyncpg://wake:${POSTGRES_PASSWORD:-wake-dev-password}@postgres:5432/wake
      WAKE_REDIS_URL: redis://redis:6379
      WAKE_VAULT_URL: http://infisical-vault:8080
      WAKE_AGENTGATEWAY_URL: http://agentgateway:8888
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Phase 5 — Wake Dashboard (Next.js 15 standalone).
  # Talks to wake-api over the docker network. The dashboard reads its
  # backend URL at request time via NEXT_PUBLIC_WAKE_API_BASE (browser)
  # and WAKE_API_URL (server-side route handlers). The API key is
  # injected from the host env (or a .env file at deploy time) and
  # lives only in the browser's localStorage after login.
  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
    image: wake-ai/dashboard:0.5.0
    restart: unless-stopped
    environment:
      # Browser-facing API base URL. Public, baked into the client bundle.
      # In single-host docker-compose that's usually http://localhost:8080.
      NEXT_PUBLIC_WAKE_API_BASE: ${WAKE_API_PUBLIC_URL:-http://localhost:8080}
      # Server-side requests issued by Next.js Route Handlers (e.g. the
      # OAuth callback proxy) stay on the docker network.
      WAKE_API_URL: http://wake-api:8080
      WAKE_API_KEY: ${WAKE_API_KEY:?WAKE_API_KEY is required — export it before docker compose up}
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "3000:3000"
    depends_on:
      - wake-api
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 20s

volumes:
  pgdata: {}
