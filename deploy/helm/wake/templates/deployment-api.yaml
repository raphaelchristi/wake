{{- if .Values.api.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "wake.fullname" . }}-api
  labels:
    {{- include "wake.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      {{- include "wake.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "wake.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
      {{- with .Values.api.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "wake.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: api
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          image: "{{ (default .Values.image.repository (index .Values.api.image "repository")) }}:{{ (default .Values.image.tag (index .Values.api.image "tag")) }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["server", "--host", "0.0.0.0", "--port", "8080"]
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "wake.fullname" . }}-secret
                  key: postgres-password
            - name: WAKE_DATABASE_URL
              value: {{ include "wake.databaseUrl" . | quote }}
            - name: WAKE_REDIS_URL
              value: {{ include "wake.redisUrl" . | quote }}
            - name: WAKE_VAULT_URL
              value: {{ include "wake.vaultUrl" . | quote }}
            - name: WAKE_AGENTGATEWAY_URL
              value: {{ include "wake.agentgatewayUrl" . | quote }}
            # Fail-closed auth (Phase 5.1 finding #3). When true the API
            # refuses to serve authenticated routes unless WAKE_API_KEY
            # is also injected — surfacing missing-Secret as 503 instead
            # of silently passing every request.
            - name: WAKE_AUTH_REQUIRED
              value: {{ .Values.auth.required | quote }}
            - name: WAKE_API_KEY
              valueFrom:
                secretKeyRef:
                  {{- if .Values.auth.apiKeySecretRef.name }}
                  name: {{ .Values.auth.apiKeySecretRef.name | quote }}
                  key: {{ .Values.auth.apiKeySecretRef.key | quote }}
                  {{- else }}
                  name: {{ include "wake.fullname" . }}-secret
                  key: wake-api-key
                  {{- end }}
            # Shared OAuth state secret (Phase 5.1 finding #4 fix). All
            # API replicas must see the same value or callbacks initiated
            # on pod A fail verification on pod B. ``wake.api.oauth_state``
            # falls back to a per-process random value when this env is
            # unset, which only works for a single-replica deployment.
            - name: WAKE_OAUTH_STATE_SECRET
              valueFrom:
                secretKeyRef:
                  {{- if .Values.auth.oauthStateSecretRef.name }}
                  name: {{ .Values.auth.oauthStateSecretRef.name | quote }}
                  key: {{ .Values.auth.oauthStateSecretRef.key | quote }}
                  {{- else }}
                  name: {{ include "wake.fullname" . }}-secret
                  key: wake-oauth-state-secret
                  optional: true
                  {{- end }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "wake.fullname" . }}-secret
                  key: anthropic-api-key
                  optional: true
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "wake.fullname" . }}-secret
                  key: openai-api-key
                  optional: true
            {{- if .Values.observability.otel.enabled }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.observability.otel.endpoint | quote }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
      {{- with .Values.api.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
