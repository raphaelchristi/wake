{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "wake.fullname" . }}
  labels:
    {{- include "wake.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- /*
              API paths first — Ingress controllers match longest-prefix,
              but explicit ordering reduces surprise. /v1, /health,
              /openapi.json and /docs always go to wake-api.
          */}}
          {{- if $.Values.api.enabled }}
          - path: /v1
            pathType: Prefix
            backend:
              service:
                name: {{ include "wake.fullname" $ }}-api
                port:
                  number: {{ $.Values.api.service.port }}
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: {{ include "wake.fullname" $ }}-api
                port:
                  number: {{ $.Values.api.service.port }}
          - path: /openapi.json
            pathType: Exact
            backend:
              service:
                name: {{ include "wake.fullname" $ }}-api
                port:
                  number: {{ $.Values.api.service.port }}
          - path: /docs
            pathType: Prefix
            backend:
              service:
                name: {{ include "wake.fullname" $ }}-api
                port:
                  number: {{ $.Values.api.service.port }}
          - path: /redoc
            pathType: Prefix
            backend:
              service:
                name: {{ include "wake.fullname" $ }}-api
                port:
                  number: {{ $.Values.api.service.port }}
          {{- end }}
          {{- /*
              Frontend catches everything else at the root. If the
              frontend is disabled we still emit api paths above so
              kubectl get ingress remains useful.
          */}}
          {{- if $.Values.frontend.enabled }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "wake.fullname" $ }}-frontend
                port:
                  number: {{ $.Values.frontend.service.port }}
          {{- else if $.Values.api.enabled }}
          {{- /* Fallback: route / to api when frontend disabled (preserve old behaviour). */}}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "wake.fullname" $ }}-api
                port:
                  number: {{ $.Values.api.service.port }}
          {{- end }}
    {{- end }}
{{- end }}
