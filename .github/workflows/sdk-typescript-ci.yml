name: SDK TypeScript CI

on:
  push:
    branches: [main]
    tags:
      - "sdk-ts-v*"
    paths:
      - "sdks/typescript/**"
      - ".github/workflows/sdk-typescript-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "sdks/typescript/**"
      - ".github/workflows/sdk-typescript-ci.yml"

concurrency:
  group: sdk-ts-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: sdks/typescript

jobs:
  typecheck:
    name: Type-check (tsc strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: sdks/typescript/pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile=false
      - name: tsc --noEmit
        run: pnpm typecheck

  test:
    name: Tests (vitest)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
          cache-dependency-path: sdks/typescript/pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile=false
      - name: Vitest
        run: pnpm test

  build:
    name: Build + bundle budget
    runs-on: ubuntu-latest
    needs: [typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: sdks/typescript/pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile=false
      - name: Build
        run: pnpm build
      - name: Bundle size budget (<30KB gzip)
        run: |
          ESM_SIZE=$(gzip -c dist/index.js | wc -c | tr -d ' ')
          CJS_SIZE=$(gzip -c dist/index.cjs | wc -c | tr -d ' ')
          BUDGET=30720
          echo "ESM gzip: ${ESM_SIZE}B"
          echo "CJS gzip: ${CJS_SIZE}B"
          if [ "$ESM_SIZE" -gt "$BUDGET" ]; then
            echo "::error::ESM bundle ${ESM_SIZE}B exceeds budget ${BUDGET}B"
            exit 1
          fi
          if [ "$CJS_SIZE" -gt "$BUDGET" ]; then
            echo "::error::CJS bundle ${CJS_SIZE}B exceeds budget ${BUDGET}B"
            exit 1
          fi
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wake-ai-client-ts-dist
          path: sdks/typescript/dist/
          retention-days: 14

  publish-npm:
    name: Publish to npm (on tag)
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/sdk-ts-v')
    environment:
      name: npm
      url: https://www.npmjs.com/package/@wake-ai/client
    permissions:
      contents: read
      id-token: write # OIDC provenance for npm
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org/"
          cache: pnpm
          cache-dependency-path: sdks/typescript/pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile=false
      - name: Build
        run: pnpm build
      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm publish --no-git-checks --access public --provenance
