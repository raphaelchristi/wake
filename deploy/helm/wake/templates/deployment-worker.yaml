{{- if .Values.worker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "wake.fullname" . }}-worker
  labels:
    {{- include "wake.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      {{- include "wake.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "wake.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker
      {{- with .Values.worker.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "wake.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: worker
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          image: "{{ (default .Values.image.repository (index .Values.worker.image "repository")) }}:{{ (default .Values.image.tag (index .Values.worker.image "tag")) }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["worker", "--concurrency", "{{ .Values.worker.concurrency }}"]
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "wake.fullname" . }}-secret
                  key: postgres-password
            - name: WAKE_DATABASE_URL
              value: {{ include "wake.databaseUrl" . | quote }}
            - name: WAKE_REDIS_URL
              value: {{ include "wake.redisUrl" . | quote }}
            - name: WAKE_VAULT_URL
              value: {{ include "wake.vaultUrl" . | quote }}
            - name: WAKE_AGENTGATEWAY_URL
              value: {{ include "wake.agentgatewayUrl" . | quote }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "wake.fullname" . }}-secret
                  key: anthropic-api-key
                  optional: true
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "wake.fullname" . }}-secret
                  key: openai-api-key
                  optional: true
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
      {{- with .Values.worker.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
