# Wake — pgbackrest dev configuration (docker-compose).
#
# Mirrors the Helm chart's templated config but with hard-coded values
# pointing at the local MinIO. Used by docker-compose.backup.yml.

[global]
repo1-type=s3
repo1-s3-bucket=wake-backups
repo1-s3-endpoint=http://minio:9000
repo1-s3-region=us-east-1
repo1-s3-uri-style=path
repo1-s3-verify-tls=n
repo1-path=/pgbackrest

repo1-retention-full=4
repo1-retention-full-type=count
repo1-retention-archive=30
repo1-retention-archive-type=incr

compress-type=zst
compress-level=3
process-max=2

log-level-console=info
log-level-file=off
log-path=/tmp

start-fast=y
archive-check=y

[wake-dev]
pg1-host=postgres
pg1-port=5432
pg1-user=wake
pg1-database=wake
